[env:esp32doit]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200

lib_deps = 
    DHT sensor library=https://github.com/adafruit/DHT-sensor-library.git
    DallasTemperature=https://github.com/milesburton/Arduino-Temperature-Control-Library.git
    OneWire=https://github.com/PaulStoffregen/OneWire.git
    Adafruit SSD1306=https://github.com/adafruit/Adafruit_SSD1306.git
    Adafruit GFX Library=https://github.com/adafruit/Adafruit-GFX-Library.git

build_flags =
    -DCORE_DEBUG_LEVEL=3
